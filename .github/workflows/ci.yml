name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npm run db:generate --workspace=server
      - name: Build shared and server
        run: npm run build
      - name: Run Linting
        run: npm run lint
      - name: Run Prettier check
        run: npm run format:check
      - name: Run Typecheck
        run: npm run typecheck
      - name: Run Tests
        run: npm run test
